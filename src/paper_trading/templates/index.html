<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实盘模拟监控 — Paper Trading</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>量化策略监控面板</h1>
        <div id="status-bar">
            <span id="clock">--</span>
            <span id="market-status" class="badge">--</span>
        </div>
    </header>

    <nav class="top-tabs">
        <button class="tab-btn active" data-tab="paper">实盘监控</button>
        <button class="tab-btn" data-tab="backtest">回测分析</button>
    </nav>

    <!-- ══════════════ 实盘 Tab ══════════════ -->
    <div id="tab-paper" class="tab-content active">
        <div class="summary-cards">
            <div class="card"><div class="card-label">总资产</div><div class="card-value" id="total-value">--</div></div>
            <div class="card"><div class="card-label">可用资金</div><div class="card-value" id="capital">--</div></div>
            <div class="card"><div class="card-label">累计收益</div><div class="card-value" id="total-return">--</div></div>
            <div class="card"><div class="card-label">持仓数</div><div class="card-value" id="pos-count">--</div></div>
        </div>
        <div class="main-grid single-col">
            <div class="panel"><h3>净值曲线</h3><div id="chart-nav-paper" class="chart-box"></div></div>
            <div class="panel"><h3>持仓明细</h3><div class="table-wrap"><table id="positions-table">
                <thead><tr><th>代码</th><th>数量</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th></tr></thead><tbody></tbody></table></div></div>
            <div class="panel"><h3>成交记录 <select id="paper-trade-filter" onchange="filterPaperTrades()" style="width:140px;margin-left:8px;padding:2px 8px;font-size:12px;"><option value="">全部日期</option></select></h3><div class="table-wrap"><table id="trades-table">
                <thead><tr><th>时间</th><th>代码</th><th>方向</th><th>数量</th><th>价格</th><th>金额</th></tr></thead><tbody></tbody></table></div></div>

        </div>
    </div>

    <!-- ══════════════ 回测 Tab ══════════════ -->
    <div id="tab-backtest" class="tab-content">
        <div class="form-row" style="padding:16px 0;">
            <div class="form-group">
                <label>选择回测区间</label>
                <select id="bt-year-select" onchange="loadBacktestYear()" style="padding:8px 12px;border:1px solid #e0e4e8;border-radius:6px;font-size:14px;">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
        <div id="bt-load-status" class="status-msg"></div>

        <!-- 回测结果展示 -->
        <div id="bt-results" style="display:none">
            <div class="summary-cards" id="bt-cards">
                <div class="card"><div class="card-label">累计收益</div><div class="card-value" id="bt-return">--</div></div>
                <div class="card"><div class="card-label">年化收益</div><div class="card-value" id="bt-annual">--</div></div>
                <div class="card"><div class="card-label">夏普比率</div><div class="card-value" id="bt-sharpe">--</div></div>
                <div class="card"><div class="card-label">最大回撤</div><div class="card-value" id="bt-dd">--</div></div>
                <div class="card"><div class="card-label">Alpha</div><div class="card-value" id="bt-alpha">--</div></div>
                <div class="card"><div class="card-label">胜率</div><div class="card-value" id="bt-winrate">--</div></div>
            </div>

            <div class="main-grid">
                <div class="panel"><h3>回测净值曲线</h3><div id="chart-nav-bt" class="chart-box"></div></div>
                <div class="panel"><h3>回撤曲线</h3><div id="chart-dd-bt" class="chart-box"></div></div>
                <div class="panel"><h3>回测成交记录 <select id="bt-trade-filter" onchange="filterBtTrades()" style="width:160px;margin-left:8px;padding:2px 8px;font-size:12px;"><option value="">全部日期</option></select></h3><div class="table-wrap"><table id="bt-trades-table">
                    <thead><tr><th>日期</th><th>代码</th><th>方向</th><th>数量</th><th>价格</th></tr></thead><tbody></tbody></table></div></div>
                <div class="panel"><h3>最终持仓</h3><div class="table-wrap"><table id="bt-positions-table">
                    <thead><tr><th>代码</th><th>数量</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th></tr></thead><tbody></tbody></table></div></div>
            </div>
        </div>
    </div>



    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
