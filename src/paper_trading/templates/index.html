<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实盘模拟监控 — Paper Trading</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>📊 实盘模拟监控</h1>
        <div id="status-bar">
            <span id="clock">--</span>
            <span id="market-status" class="badge">--</span>
        </div>
    </header>

    <div class="summary-cards">
        <div class="card">
            <div class="card-label">总资产</div>
            <div class="card-value" id="total-value">--</div>
        </div>
        <div class="card">
            <div class="card-label">可用资金</div>
            <div class="card-value" id="capital">--</div>
        </div>
        <div class="card">
            <div class="card-label">累计收益</div>
            <div class="card-value" id="total-return">--</div>
        </div>
        <div class="card">
            <div class="card-label">持仓数</div>
            <div class="card-value" id="pos-count">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <h3>📈 净值曲线</h3>
            <div id="chart-nav" style="height:360px"></div>
        </div>
        <div class="panel">
            <h3>📋 持仓明细</h3>
            <div class="table-wrap">
                <table id="positions-table">
                    <thead><tr><th>代码</th><th>数量</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="panel">
            <h3>📝 今日成交</h3>
            <div class="table-wrap">
                <table id="trades-table">
                    <thead><tr><th>时间</th><th>代码</th><th>方向</th><th>数量</th><th>价格</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="panel">
            <h3>📉 日内走势</h3>
            <div id="chart-intraday" style="height:360px"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
